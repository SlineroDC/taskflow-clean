services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Qwe.123*
      POSTGRES_DB: TaskFlowDb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "5259:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=TaskFlowDb;Username=postgres;Password=Qwe.123*;Ssl Mode=Disable
      # To enable Google OAuth set these values in Railway or a local .env file
      # Authentication__Google__ClientId: "your-google-client-id"
      # Authentication__Google__ClientSecret: "your-google-client-secret"
    restart: unless-stopped

volumes:
  pgdata:
